services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: bbdw_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-bbdw}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - "./server/app/database/BB DW PostgreSQL.sql:/docker-entrypoint-initdb.d/init.sql:ro"
    ports:
      - "5433:5432"          # Exposto localmente para usar com DBeaver / pgAdmin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-bbdw}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask API ────────────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bbdw_server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY}
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
      PORT: ${PORT:-6000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      DB_HOST: db                   # Forçado para dentro do Docker
      DB_PORT: 5432                 # Forçado para dentro do Docker
      DB_NAME: ${DB_NAME:-bbdw}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-admin123}
      OLLAMA_URL: http://ollama:11434/api/generate
    ports:
      - "${PORT:-6000}:${PORT:-6000}"
    volumes:
      - ./server:/app               # hot-reload em desenvolvimento
      - /app/venv                   # preserva o venv dentro do container

  # ── Ollama (IA Local) ───────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: bbdw_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # ── Auto-Download Modelo IA ─────────────────────────────────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: bbdw_ollama_pull
    depends_on:
      - ollama
    command: pull llama3
    environment:
      OLLAMA_HOST: "http://ollama:11434"

volumes:
  postgres_data:
    name: bbdw_postgres_data
  ollama_data:
    name: bbdw_ollama_data
